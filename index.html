<!DOCTYPE html>
<html lang="pt-PT">
<head>

<script id="APP_BRAGA_THEME_LOADER">
(function(){
  try{
    const savedTheme = localStorage.getItem("app-theme") || "dark";
    if(savedTheme === "dark"){
      document.documentElement.classList.add("dark");
      document.addEventListener("DOMContentLoaded", () => document.body?.classList.add("dark"));
    }

    const normalizarCor = (value) => /^#[0-9a-fA-F]{6}$/.test(String(value || "").trim()) ? String(value).trim().toLowerCase() : "";
    const cookieMatch = document.cookie.match(/(?:^|;\s*)appAccentColor=([^;]+)/);
    const color = normalizarCor(cookieMatch ? decodeURIComponent(cookieMatch[1]) : "");
    if(!color) return;

    const rgb = {
      r: parseInt(color.slice(1, 3), 16),
      g: parseInt(color.slice(3, 5), 16),
      b: parseInt(color.slice(5, 7), 16)
    };
    const adjust = (amount) => {
      const next = [rgb.r, rgb.g, rgb.b].map((value) => Math.max(0, Math.min(255, value + amount)));
      return "#" + next.map((value) => value.toString(16).padStart(2, "0")).join("");
    };

    const hover = adjust(-28);
    const light = adjust(34);
    const soft = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, .16)`;
    const softer = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, .08)`;
    const line = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, .22)`;
    const glow = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, .28)`;
    const vars = {
      "--app-accent": color,
      "--app-accent-hover": hover,
      "--app-accent-light": light,
      "--app-accent-rgb": `${rgb.r} ${rgb.g} ${rgb.b}`,
      "--app-accent-soft": soft,
      "--app-accent-softer": softer,
      "--app-accent-line": line,
      "--app-accent-glow": glow,
      "--az-var(--app-accent, #2563eb)": color,
      "--az-var(--app-accent, #2563eb)-2": hover,
      "--az-var(--app-accent, #2563eb)-soft": soft,
      "--az-line": line,
      "--primary": color,
      "--primary-hover": hover,
      "--sidebar-hover": color,
      "--brinka-pink": color,
      "--brinka-purple": hover,
      "--brinka-var(--app-accent, #2563eb)": color,
      "--brinka-var(--app-accent, #2563eb)2": light,
      "--ent-blue": color,
      "--ent-purple": hover,
      "--ent-var(--app-accent, #2563eb)": color,
      "--app-blue": color,
      "--app-blue-soft": soft
    };
    Object.entries(vars).forEach(([key, val]) => document.documentElement.style.setProperty(key, val));
  }catch(e){ console.log(e); }
})();
</script>

  <meta charset="UTF-8" />
  <meta http-equiv="refresh" content="0; url=html/index.html" />

  <script>
    window.location.href = "html/index.html";
  </script>

</head>
