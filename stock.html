<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock</title>
  <meta name="theme-color" content="#111827">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body>
<aside class="sidebar"></aside>
<main class="main">

  <div class="topbar premium-topbar"><div class="topbar-main"><h1>Stock</h1><p class="subtitle">Toners disponíveis</p></div><div class="topbar-status"><span class="status-pill">Sistema Online</span><span class="version-pill" id="appVersion">v1.0.0 Premium</span></div></div>

  <div class="page-hero">
    <div class="page-hero-title">Stock</div>
    <p class="page-hero-subtitle">Toners disponíveis</p>
    <div class="visual-badge-row">
      <span class="visual-badge">✨ Modo Visual</span>
      <span class="visual-badge">🏢 Estilo Empresa</span>
      <span class="visual-badge">⚡ UI Premium</span>
    </div>
  </div>

  <div class="stats-grid"><div class="stat-card"><span>Total em stock</span><strong id="countStock">0</strong></div></div>
  <div class="panel">
    <div class="toolbar">
      <input id="search" type="text" placeholder="Pesquisar stock..." oninput="filtrar()">
      <button class="secondary-btn" onclick="exportarExcelStock()">Exportar Excel Stock</button>
      <button class="secondary-btn" onclick="exportarExcelTudo()">Exportar Tudo</button>
    </div>
    <div id="listaStock" class="cards-list"></div>
  </div>


  <div id="modalEditarStock" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="section-header"><div><h3>Editar Stock</h3><p class="section-subtitle">Editar toner em stock</p></div></div>
      <div class="form-grid">
        <label><span>Equipamento</span><input id="editStockEquipamento" type="text"></label>
        <label><span>Cor</span><input id="editStockCor" type="text"></label>
        <label><span>Localização</span><input id="editStockLocalizacao" type="text"></label>
        <label><span>Lote</span><input id="editStockLote" type="text"></label>
        <label><span>Data Scan</span><input id="editStockData" type="text"></label>
        <label><span>Data Folha</span><input id="editStockDataFolha" type="text"></label>
      </div>
      <div class="card-actions" style="margin-top:14px;">
        <button class="primary-btn" onclick="guardarEdicaoStockModal()">Guardar</button>
        <button class="secondary-btn" onclick="fecharEdicaoStockModal()">Cancelar</button>
      </div>
    </div>
  </div>

</main>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script src="app.js"></script>
  <script src="sidebar.js"></script>
</body>
</html>
