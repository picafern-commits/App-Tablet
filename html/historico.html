  <div class="page-hero">
    <div class="page-hero-title">Histórico</div>
	<span class="status-pill">Sistema Online</span>
  </div>

  <div class="stats-grid"><div class="stat-card stat-card-full"><span>Total usados</span><strong id="countUsados">0</strong></div></div>
  <div class="panel"><div id="listaHistorico" class="cards-list"></div></div>


  <div id="modalEditarHistorico" class="modal-overlay" style="display:none;">
    <div class="modal-card">
      <div class="section-header"><div><h3>Editar Histórico</h3><p class="section-subtitle">Editar registo histórico</p></div></div>
      <div class="form-grid">
        <label><span>Equipamento</span><input id="editHistoricoEquipamento" type="text"></label>
        <label><span>Cor</span><input id="editHistoricoCor" type="text"></label>
        <label><span>Localização</span><input id="editHistoricoLocalizacao" type="text"></label>
        <label><span>Lote</span><input id="editHistoricoLote" type="text"></label>
        <label><span>Data Scan</span><input id="editHistoricoData" type="text"></label>
        <label><span>Data Folha</span><input id="editHistoricoDataFolha" type="text"></label>
      </div>
      <div class="card-actions" style="margin-top:14px;">
        <button class="primary-btn" onclick="guardarEdicaoHistoricoModal()">Guardar</button>
        <button class="secondary-btn" onclick="fecharEdicaoHistoricoModal()">Cancelar</button>
      </div>
    </div>
  </div>
