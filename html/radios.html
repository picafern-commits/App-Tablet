
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádios</title>

<link rel="stylesheet" href="../css/style.css">

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.enterprise-radios-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:18px;
    margin-top:25px;
}

.radio-card{
    background:#111827;
    border-radius:18px;
    padding:18px;
    border:1px solid rgba(255,255,255,.08);
}

.enterprise-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:99999;
}

.enterprise-modal-content{
    width:95%;
    max-width:500px;
    background:#111827;
    border-radius:18px;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.enterprise-input{
    background:#1f2937;
    border:none;
    border-radius:12px;
    padding:14px;
    color:white;
}

.enterprise-btn{
    border:none;
    border-radius:12px;
    padding:12px 16px;
    cursor:pointer;
    font-weight:700;
}

.primary{
    background:#2563eb;
    color:white;
}

.delete{
    background:#dc2626;
    color:white;
}

.edit{
    background:#f59e0b;
    color:white;
}

</style>
</head>

<body>

<div style="padding:25px;">

    <div style="display:flex;justify-content:space-between;align-items:center;">

        <h1>Rádios</h1>

        <button id="novoRadioBtn" class="enterprise-btn primary">
            Novo Rádio
        </button>

    </div>

    <div id="radiosList" class="enterprise-radios-grid"></div>

    <div style="margin-top:40px;">

        <h2>Relatório Semanal</h2>

        <div id="relatorioSemanal"></div>

    </div>

</div>

<div id="radioModal" class="enterprise-modal">

    <div class="enterprise-modal-content">

        <h2>Novo Rádio</h2>

        <input type="text" id="radioNome"
            placeholder="Nome do Rádio"
            class="enterprise-input">

        <input type="text" id="radioMac"
            placeholder="MAC Address"
            class="enterprise-input">

        <input type="text" id="radioSerial"
            placeholder="Número de Série"
            class="enterprise-input">

        <div style="display:flex;gap:10px;">

            <button id="guardarRadioBtn"
                class="enterprise-btn primary">

                Guardar

            </button>

            <button id="fecharModalBtn"
                class="enterprise-btn delete">

                Fechar

            </button>

        </div>

    </div>

</div>

<script src="../js/firebase-init.js"></script>
<script src="../js/app.js"></script>

</body>
</html>
