<script>
(function(){
  var v='1.58.163';
  var key='appbraga-visual-clean-'+v;
  try{
    if(!sessionStorage.getItem(key)){
      sessionStorage.setItem(key,'1');
      if(window.caches) caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); }).catch(function(){});
      if('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(function(regs){ regs.forEach(function(r){ if(r.active) r.active.postMessage({type:'SKIP_WAITING'}); }); }).catch(function(){});
    }
  }catch(e){}
})();
</script>
