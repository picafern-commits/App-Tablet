<script id="APP_BRAGA_THEME_LOADER">
(function(){

  try{

    const savedTheme =
      localStorage.getItem("app-theme") || "dark";

    if(savedTheme === "dark"){
      document.documentElement.classList.add("dark");
      document.body.classList.add("dark");
    }

  }catch(e){
    console.log(e);
  }

})();
</script>
