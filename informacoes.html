<!DOCTYPE html>
<html lang="pt">
<head>
<script src="js/app-theme-pro.js?v=theme-pro-1"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informações</title>
<style>
body{
background:#050816;
color:white;
font-family:Arial;
padding:30px;
}
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}
.search{
width:300px;
height:50px;
border:none;
border-radius:14px;
padding:0 15px;
background:#081224;
color:white;
}
.btn{
height:50px;
padding:0 20px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
cursor:pointer;
}
.panel{
background:#081224;
border-radius:24px;
padding:24px;
}
.card{
background:#0b1730;
border-radius:18px;
padding:20px;
margin-bottom:18px;
display:flex;
justify-content:space-between;
align-items:center;
}
.card h3{
margin-bottom:10px;
}
.card p{
color:#94a3b8;
}
.badge{
background:#1d4ed8;
padding:8px 14px;
border-radius:10px;
}
.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.7);
}
.modal-box{
width:700px;
background:#081224;
padding:30px;
border-radius:24px;
}
.modal-box input,
.modal-box textarea,
.modal-box select{
width:100%;
margin-bottom:18px;
padding:14px;
border:none;
border-radius:14px;
background:#0f172a;
color:white;
}
.modal-box textarea{
min-height:180px;
}

.main-content{
margin-left:240px;
width:calc(100% - 240px);
padding:24px;
}
</style>

<link rel="stylesheet" href="../css/sidebar-enterprise.css">
  <link rel="stylesheet" href="css/app-theme-pro.css?v=theme-pro-1">
  <link rel="stylesheet" href="css/enterprise/ops.css?v=ops-1">
  <link rel="stylesheet" href="css/iphone-sidebar-final.css?v=iphone-sidebar-final-1">
</head>

<body>
<div class="main-content">

<div class="top">

<div>
<h1>Informações</h1>
<p>Consulte e gerencie informações importantes.</p>
</div>

<div style="display:flex;gap:14px;">
<input type="text" id="search" class="search" placeholder="Pesquisar por título...">
<button class="btn" onclick="openModal()">+ Nova Informação</button>
</div>

</div>

<div class="panel">

<div id="list">

<div class="card">
<div>
<h3>Horário de Funcionamento</h3>
<p>Informações sobre funcionamento da empresa.</p>
</div>
<div class="badge">Avisos</div>
</div>

</div>

</div>

<div class="modal" id="modal">

<div class="modal-box">

<h2>Nova Informação</h2>

<input type="text" id="titulo" placeholder="Título">

<select id="categoria">
<option>Avisos</option>
<option>Procedimentos</option>
<option>Políticas</option>
<option>Outros</option>
</select>

<textarea id="descricao" placeholder="Informações..."></textarea>

<div style="display:flex;justify-content:flex-end;gap:10px;">
<button class="btn" onclick="closeModal()">Cancelar</button>
<button class="btn" onclick="saveInfo()">Guardar</button>
</div>

</div>

</div>

<script>

const modal=document.getElementById("modal");

function openModal(){
modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

function saveInfo(){

const titulo=document.getElementById("titulo").value;
const descricao=document.getElementById("descricao").value;
const categoria=document.getElementById("categoria").value;

if(!titulo || !descricao){
alert("Preenche os campos");
return;
}

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<div>
<h3>${titulo}</h3>
<p>${descricao}</p>
</div>
<div class="badge">${categoria}</div>
`;

document.getElementById("list").prepend(card);

closeModal();

}

document.getElementById("search")
.addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll(".card")
.forEach(card=>{

const title=
card.querySelector("h3")
.innerText
.toLowerCase();

card.style.display=
title.includes(value)
? "flex"
: "none";

});

});

</script>

</div>
<script src="js/enterprise/ops.js?v=ops-1"></script>
<script src="js/iphone-sidebar-final.js?v=iphone-sidebar-final-1"></script>
</body>
</html>
