name: Build Windows Installer

on:
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "package-lock.json"
      - "js/**"
      - "html/**"
      - "css/**"
      - "tools/**"
      - "assets/**"
      - "img/**"
      - "manifest.json"
      - "sw.js"
      - "icon.ico"
      - "icon-192.png"
      - "icon-512.png"
      - ".github/workflows/build-windows-installer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: App-Braga-Windows-Installer
          path: |
            dist/*.exe
            dist/latest*.yml
          if-no-files-found: error
