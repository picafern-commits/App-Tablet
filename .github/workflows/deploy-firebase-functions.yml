name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
      - master
    paths:
      - "functions/**"
      - "firebase.json"
      - ".firebaserc"
      - "FIREBASE_FUNCTIONS_NOTIFICACOES.md"
      - ".github/workflows/deploy-firebase-functions.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install functions dependencies
        run: npm ci --prefix functions

      - name: Prepare Web Push env
        env:
          VAPID_PUBLIC: ${{ secrets.APP_BRAGA_VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE: ${{ secrets.APP_BRAGA_VAPID_PRIVATE_KEY }}
        run: |
          if [ -z "$VAPID_PUBLIC" ] || [ -z "$VAPID_PRIVATE" ]; then
            echo "Missing APP_BRAGA_VAPID_PUBLIC_KEY or APP_BRAGA_VAPID_PRIVATE_KEY GitHub secret."
            exit 1
          fi
          {
            printf "APP_BRAGA_VAPID_PUBLIC_KEY=%s\n" "$VAPID_PUBLIC"
            printf "APP_BRAGA_VAPID_PRIVATE_KEY=%s\n" "$VAPID_PRIVATE"
          } > functions/.env

      - name: Deploy functions
        run: firebase deploy --only functions --project toner-manager-756c4
